<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>פאטקונקט | חיפוש</title>
    <meta http-equiv="refresh" content="0; url=src/features/lost-animals/search.html">
    <style>
      body{font-family:Assistant,Arial,sans-serif;margin:0;display:grid;place-items:center;min-height:100vh;background:#f8fafc;color:#0f172a;padding:24px}
      .card{max-width:560px;background:#fff;border:1px solid rgba(15,23,42,.08);border-radius:20px;padding:24px;box-shadow:0 18px 48px rgba(15,23,42,.08)}
      a{color:#2563eb}
    </style>
    <script src="src/router.js"></script>
    <script>
      window.__redirectTarget = (window.SiteRoutes && window.SiteRoutes['lostAnimalsSearch']) || '#';
      (function(){
        var meta = document.querySelector('meta[http-equiv="refresh"]');
        if (meta) meta.setAttribute('content', '0; url=' + window.__redirectTarget);
        redirectToSiteRoute('lostAnimalsSearch');
      })();
    </script>
  </head>
  <body>
    <div class="card">
      <strong>מעבירה אל חיפוש חיה…</strong>
      <p>אם העמוד לא נפתח אוטומטית, אפשר ללחוץ כאן: <a id="fallbackLink" href="src/features/lost-animals/search.html">חיפוש חיה</a>.</p>
    </div>
    <script>
      (function(){
        var link = document.getElementById('fallbackLink');
        if (link) link.href = window.__redirectTarget || '#';
      })();
    </script>
  </body>
</html>
